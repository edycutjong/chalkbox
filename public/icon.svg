<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Chalkbox icon">
  <!-- CHALKBOX icon: a chalk-stroke verification check inside the box.
       Box = the sandboxed sim; check = the headless self-test that must
       pass before publish. Reads clearly at 32x32. Colors use CSS var()
       with hex fallback: hex wins when rasterized standalone; the token
       wins when embedded in an app with the design tokens loaded.
       (Note: no double-hyphen sequences in this comment; XML forbids them.) -->
  <defs>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="var(--primary, #14B8A6)"/>
      <stop offset="100%" stop-color="var(--accent, #F59E0B)"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="var(--text-hi, #F8FAFC)" stop-opacity="0.18"/>
      <stop offset="45%" stop-color="var(--text-hi, #F8FAFC)" stop-opacity="0"/>
    </linearGradient>
    <filter id="innerGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14" result="blur"/>
      <feOffset in="blur" dx="0" dy="0" result="offsetBlur"/>
      <feComposite in="offsetBlur" in2="SourceAlpha" operator="out" result="inverse"/>
      <feFlood flood-color="var(--text-hi, #F8FAFC)" flood-opacity="0.35" result="color"/>
      <feComposite in="color" in2="inverse" operator="in" result="glow"/>
      <feComposite in="glow" in2="SourceGraphic" operator="over"/>
    </filter>
    <filter id="softDrop" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="var(--primary, #14B8A6)" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- The box: rounded square in brand gradient -->
  <g filter="url(#softDrop)">
    <rect x="64" y="64" width="384" height="384" rx="96" fill="url(#brand)" filter="url(#innerGlow)"/>
    <!-- Apple-glass top sheen -->
    <rect x="64" y="64" width="384" height="384" rx="96" fill="url(#sheen)"/>
  </g>

  <!-- The self-test check: one confident chalk stroke -->
  <path d="M 148 272 L 228 352 L 366 176"
        fill="none"
        stroke="var(--bg-base, #020617)"
        stroke-width="72"
        stroke-linecap="round"
        stroke-linejoin="round"
        opacity="0.92"/>
  <path d="M 148 272 L 228 352 L 366 176"
        fill="none"
        stroke="var(--text-hi, #F8FAFC)"
        stroke-width="46"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Publish spark: the live sim leaving the box -->
  <circle cx="396" cy="140" r="26" fill="var(--text-hi, #F8FAFC)"/>
  <circle cx="396" cy="140" r="26" fill="url(#brand)" opacity="0.25"/>
</svg>
