<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chalkbox — Devpost Thumbnail 1200×800</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./_asset-utilities.css">
<style>
  body {
    width: 1200px;
    height: 800px;
    position: relative;
  }

  .canvas {
    position: relative;
    width: 1200px;
    height: 800px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Small-thumbnail rule: mesh intensity dialed UP ~20%
     via an extra boost layer over the standard .background */
  .mesh-boost {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 55% 45% at 50% 30%, var(--primary-glow) 0%, transparent 60%),
      radial-gradient(ellipse 45% 40% at 78% 78%, var(--accent-glow) 0%, transparent 60%);
    opacity: 0.55;
    z-index: -1;
  }

  /* Icon mark: 320px ≈ 40% of the 800px canvas height */
  .mark {
    width: 320px;
    height: 320px;
    filter:
      drop-shadow(0 0 50px var(--primary-glow))
      drop-shadow(0 24px 60px rgba(2, 6, 23, 0.7));
    margin-bottom: 48px;
  }

  .name {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 120px;
    letter-spacing: -0.01em;
    line-height: 1;
    text-shadow: 0 4px 40px rgba(2, 6, 23, 0.8);
  }

  /* the ONE allowed tiny corner tag */
  .corner-tag {
    position: absolute;
    bottom: 30px;
    right: 36px;
    font-family: var(--font-mono);
    font-size: 16px;
    letter-spacing: 0.08em;
    color: var(--text-low);
  }
</style>
</head>
<body>
  <div class="canvas">
    <div class="background"></div>
    <div class="mesh-boost"></div>
    <div class="grid-overlay"></div>

    <img class="mark" src="./icon.svg" alt="Chalkbox icon">
    <div class="name text-gradient">Chalkbox</div>

    <div class="corner-tag">Built for OpenAI Build Week</div>

    <div class="noise-overlay"></div>
  </div>
</body>
</html>
